# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/rise?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml

# Disable template engine (frontend is separate Vue project)
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=false

# Local media storage defaults
riseout.fileuploadpath=./upload/
riseout.fileurl=./upload/
riseout.url=http://localhost:12345
app.base-url=http://localhost:12345

# Upload limits (video module)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.max-swallow-size=-1

# Local PotPlayer launcher
video.player.enable-local-player=true
video.player.potplayer-path=C:/Program Files/DAUM/PotPlayer/PotPlayerMini64.exe
